env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

exec-once = waybar & hyprpaper & hyprctl setcursor "Future-dark-cursors" 20
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY
exec-once = /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh
exec-once = vicinae server
