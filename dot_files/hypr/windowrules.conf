############################
# Global
############################

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

############################
# Picture-in-Picture
############################

windowrule {
    name = pip-float
    match:title = ^(Picture(-|\s)in(-|\s)(p|P)icture)$
    float = 1
}

windowrule {
    name = pip-pin
    match:title = ^(Picture(-|\s)in(-|\s)(p|P)icture)$
    pin = 1
}

############################
# PulseAudio (pavucontrol)
############################

windowrule {
    name = pavucontrol
    match:class = org.pulseaudio.pavucontrol
    float = 1
    size = 50% 50%
    center = 1
}

############################
# Nemo
############################

windowrule {
    name = nemo
    match:class = nemo
    float = 1
    size = 50% 50%
    center = 1
}

############################
# Warp terminal
############################

windowrule {
    name = warp-tile
    match:class = ^dev.warp.Warp$
    tile = 1
}

############################
# Brave
############################

windowrule {
    name = brave-untitled
    match:title = ^Untitled - Brave$
    float = 1
}

############################
# CopyQ
############################

windowrule {
    name = copyq
    match:class = ^com.github.hluk.copyq$
    float = 1
    center = 1
}

############################
# JetBrains IDEs
############################

# Splash screen
windowrule {
    name = jetbrains-splash
    match:class = ^jetbrains-.*
    match:title = ^splash$
    float = 1
    center = 1
}

# Popups (not toolbox, not "win.*")
windowrule {
    name = jetbrains-popups
    match:class = ^jetbrains-(?!toolbox).*
    match:title = ^(?!win.*)
    float = 1
    move = 30% 30%
    size = 40% 40%
}

############################
# feh image viewer
############################

windowrule {
    name = feh-float
    match:class = feh
    match:title = ^feh
    float = 1
}

windowrule {
    name = feh-center
    match:class = feh
    match:title = ^feh:
    center = 1
}

############################
# Chatterino
############################

windowrule {
    name = chatterino-usercard
    match:class = ^chatterino-usercard$
    float = 1
    center = 1
    size = 400 600
}

############################
# Opacity rules
############################

windowrule {
    name = zed-opacity-child
    match:class = ^dev.zed.Zed-.*
    opacity = 0.95 0.95
}

windowrule {
    name = zed-opacity-main
    match:class = ^dev.zed.Zed$
    opacity = 0.9 0.9
}

windowrule {
    name = jetbrains-opacity
    match:class = ^jetbrains-.*
    opacity = 0.9 0.9
}

windowrule {
    name = spotify-opacity
    match:class = Spotify
    opacity = 0.8 0.8
}
